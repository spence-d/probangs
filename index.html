<!DOCTYPE html>
<html><head><script type="text/javascript">const probangs_default_config="{:autofocus? true, :suggestions :never}"</script><script src="main.js" type="text/javascript"></script><meta charset="utf-8"><title>!Pro Search</title><link href="opensearch.xml" rel="search" title="!Pro" type="application/opensearchdescription+xml"><link href="favicon.ico" rel="icon" type="image/png"><style>body{background-color:black}input#pro-search-bar{width:100%;border-width:2px;border-color:lightgray;font-family:monospace;border-style:solid;font-size:larger;background-color:#181818;border-radius:7px;color:white}input#pro-search-bar:focus{outline:0;border-color:lawngreen}h1{text-align:center;color:lightgray}div#pro-search-area{background-image:linear-gradient(to bottom,gray,black);width:50%;margin:0 auto;border-radius:7px}div#pro-search-menu a{margin:2px;border:solid gray 1px;padding:0 3px 0 3px;text-decoration:none;font-size:small;background-color:#181818;border-radius:4px;display:grid;grid-template-columns:max-content 1fr;color:whitesmoke}div#pro-search-menu a span,div#pro-search-menu a :nth-child(1n){text-align:left}div#pro-search-menu a span,div#pro-search-menu a :nth-child(2n){text-align:right}div#pro-search-menu a:focus{outline:0;background-color:green}div#pro-search-menu a:hover{border-color:green}#footer{width:100%;font-family:monospace;grid-template-rows:auto 1fr;text-align:center;position:absolute;display:grid;grid-template-columns:1fr max-content 1fr;bottom:0;left:0}#footer a{color:dimgray;text-decoration:none}#footer .pane{display:grid;grid-template-columns:1fr 2fr;column-gap:1em;color:lightgray;border:solid dimgray 1px}#footer .pane label{text-align:right}#footer .pane span{text-align:left}#footer .pane input{background-color:#181818;color:lightgray;text-align:left}#footer .pane button{text-align:center}#footer .hidden{visibility:hidden}#footer .shown{visibility:visible}</style></head><body><h1>!Pro</h1><div id="pro-search-area"></div><footer id="footer"><div class="pane hidden" id="probangs-links"><label>Search URL</label><span><a href="javascript:" onClick="probangs.frontend.copy_left(this)">📋</a></span><label>Suggestions</label><span><a href="javascript:" onClick="probangs.frontend.copy_left(this)">📋</a></span><label>Use Locally</label><span></span><label>Bookmarklet</label><span></span></div><div class="hidden"></div><div class="pane hidden" id="probangs-settings"><label for="Autofocus">autofocus?</label><select id="autofocus?" name="autofocus?"><option value="false">Disabled</option><option value="true">Enabled</option></select><label for="Suggestions">suggestions</label><select id="suggestions" name="suggestions"><option value=":never">Never</option><option value=":tab-only">On Tab Press</option><option value=":always">Always</option></select><label for="History Buffer">history</label><input id="history" name="history" type="text"><label for="Lucky Search">lucky</label><input id="lucky" name="lucky" type="text"><label for="Default Bangs">default</label><input id="default" name="default" type="text"><label></label><button onClick="probangs.frontend.handle_settings(this.parentElement);">Set</button><label></label><button onClick="probangs.config.clear_config();">Clear Config</button><label></label><button onClick="probangs.config.clear_history();">Clear History</button></div><a href="javascript:" onClick="probangs.frontend.toggle_panel(&apos;probangs-links&apos;)" tabindex="-1">🔗</a><a href="https://github.com/spence-d/probangs" tabindex="-1">probangs 0.1.0</a><a href="javascript:" onClick="probangs.frontend.toggle_panel(&apos;probangs-settings&apos;)" tabindex="-1">⚙</a></footer></body></html>
